name: Swift

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        run: |
          VERSION=$(git describe --tags --always)
          sed -i '' "s/let version = \"dev\"/let version = \"$VERSION\"/" Sources/camera-hook/Version.swift

      - name: Build
        run: swift build -c release

      - name: Upload binary
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: camera-hook
          path: .build/release/camera-hook

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: camera-hook

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: camera-hook
          generate_release_notes: true
